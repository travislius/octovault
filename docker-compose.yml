services:
  clawmissions:
    build: .
    ports:
      - "5679:5679"
    volumes:
      - /Users/tiali/clawmissions-data:/Users/tiali/clawmissions-data
      - /Users/tiali/.openclaw/agents/main/sessions:/Users/tiali/.openclaw/agents/main/sessions:ro
      - /Users/tiali/.openclaw/cron:/openclaw/cron:ro
      - /Users/tiali/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      - /Users/tiali/.ssh/known_hosts:/root/.ssh/known_hosts:ro
      - /Users/tiali/clawd:/Users/tiali/clawd:ro
    environment:
      OPENCLAW_CRON_PATH: /openclaw/cron/jobs.json
    env_file:
      - .env
    restart: unless-stopped
